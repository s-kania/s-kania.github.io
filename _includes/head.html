<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="ltLAOZcsC3RYYLc-vinsiUtedMwoy5N4v-9oYtORm1c">
  {% seo title=false %}
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}" sizes="any">
  <link rel="apple-touch-icon" href="{{ '/assets/img/favicons/apple-touch-icon.png' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.style_version }}">

  <script>
    (function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[])
    .push(arguments);},l=d.createElement(e),l.async=1,l.src=u,
    n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})
    (window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
    ml('account', '353101');
  </script>

  {% if jekyll.environment == 'production' %}
    <script src="https://getinsights.io/js/insights.js"></script>
    <script>
      insights.init('hbiwrrma0PzP_8D4');
      insights.trackPages({hash: true, search: true});
      const urlParams = new URLSearchParams(window.location.search);
      const source = urlParams.get('utm_source');
      if (source) {
        insights.track({id: 'from-source', parameters: {source}});
      }
    </script>
    <script>new Image().src='https://nullitics.com/n.gif?u=' + encodeURI('{{ site.nullitics_url }}') + '&r=' + encodeURI(document.referrer) + '&d=' + screen.width;</script>
  {% endif %}
</head>
