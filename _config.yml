title: BRICK FICTION
tagline: '&#35;klocki &#35;indiedev'
description: >-
  Blog i recenzje klocków LEGO i nie tylko. Do tego luźne wpisy i proces tworzenia gier.
url: 'https://brickfiction.pl'
baseurl: ''
lang: pl
languages:
  - pl
  - en
default_lang: pl
exclude_from_localization:
  - assets
  - output
  - tools
  - node_modules
  - .git
  - .github
  - .agents
  - .playwright-cli
  - Dockerfile
  - docker-compose.yml
  - Gemfile
  - Gemfile.lock
  - AGENTS.md
  - README.md
  - CHANGELOG.md
  - LICENSE
  - sitemap.xml
  - feed.xml
parallel_localization: false
timezone: Europe/Warsaw
avatar: /assets/img/avatar.jpg
style_version: 65

waline:
  enabled: true
  server_url: https://comments-brick-fiction.vercel.app
  client_css: https://unpkg.com/@waline/client@3.15.2/dist/waline.css
  client_js: https://unpkg.com/@waline/client@3.15.2/dist/waline.js

twitter:
  username: brick_fiction

social:
  name: brickfiction.pl
  email: kontakt@brickfiction.pl
  links: []

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ''
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: ''
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

exclude:
  - '*.gem'
  - '*.gemspec'
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - gulpfile.js
  - node_modules
  - package*.json
  - yarn.lock
  - Dockerfile
  - docker-compose.yml
  - AGENTS.md
  - .playwright-cli
  - output

jekyll-archives:
  enabled: [categories]
  layouts:
    category: archive
  permalinks:
    category: /categories/:name/

plugins:
  - jekyll-archives
  - jekyll-feed
  - jekyll-polyglot
  - jekyll-seo-tag
  - jekyll-sitemap
